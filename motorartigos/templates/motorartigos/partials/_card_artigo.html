<a href="{% url 'artigo_detalhe' artigo.id %}" class="article-card text-decoration-none">
    <div class="card-img-wrapper">
      <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=80&sig={{ artigo.id }}" alt="{{ artigo.titulo }}" class="card-img-custom">
      
      {% if artigo.nivel == 'B' %}
        <span class="badge-level level-b">Básico</span>
      {% elif artigo.nivel == 'I' %}
        <span class="badge-level level-i">Intermédio</span>
      {% else %}
        <span class="badge-level level-a">Avançado</span>
      {% endif %}
    </div>
    
    <div class="card-body-custom">
      <div class="card-meta">
        <span><i class="bi bi-clock"></i> {{ artigo.data_publicacao|date:"d M Y" }}</span>
      </div>
      <h4 class="card-title-custom">{{ artigo.titulo }}</h4>
      <p class="card-preview-text">
        {{ artigo.resumo|truncatechars:100 }}
      </p>
      
      <div class="card-footer-custom">
        <div class="author-info">
          <div class="author-avatar-sm">{{ artigo.autor.nome|make_list|first }}</div>
          <span class="author-name-sm">{{ artigo.autor.nome }}</span>
        </div>
        <span class="read-more-link">
          Ler mais <i class="bi bi-arrow-right"></i>
        </span>
      </div>
    </div>
  </a>
