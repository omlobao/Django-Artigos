{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DevBlog Django - Tecnologia & Design{% endblock %}</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

  <nav class="custom-navbar">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand brand-logo" href="{% url 'home' %}">
        <i class="bi bi-journal-code" style="color: var(--primary-accent);"></i>
        <span>DevBlog</span>Django
      </a>
      <span class="badge bg-dark border border-secondary text-secondary py-2 px-3 rounded-pill d-none d-sm-inline-block">
        Mapeamento de Modelos Django Ativo
      </span>
    </div>
  </nav>

  {% block content %}
  {% endblock %}

  <footer class="custom-footer mt-5">
    <div class="container text-center">
      <p class="mb-2 text-white">DevBlog Django</p>
      <p class="small mb-0">Projeto Refatorado com Django Template Language</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
